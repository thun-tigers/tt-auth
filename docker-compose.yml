services:
  tt-auth:
    build: .
    image: ghcr.io/swisi/tt-auth:latest
    ports:
      - "8085:5000"
    volumes:
      - tt-auth-data:/app/instance
    depends_on:
      tt-postgres-auth:
        condition: service_healthy
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-postgresql+psycopg://tt_auth:tt_auth_password@tt-postgres-auth:5432/tt_auth}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-8}
      - JWT_COOKIE_DOMAIN=${JWT_COOKIE_DOMAIN:-localhost}
      - JWT_COOKIE_SECURE=${JWT_COOKIE_SECURE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUTO_CREATE_DB=true
      - CREATE_DEFAULT_USERS=${CREATE_DEFAULT_USERS:-true}
      - CREATE_DEFAULT_SERVICES=${CREATE_DEFAULT_SERVICES:-true}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - DEFAULT_MEMBERS_URL=${DEFAULT_MEMBERS_URL:-http://localhost:8088}
      - DEFAULT_AGENDA_URL=${DEFAULT_AGENDA_URL:-http://localhost:8086}
      - DEFAULT_ANALYTICS_URL=${DEFAULT_ANALYTICS_URL:-http://localhost:8087}
      - DEFAULT_INFRA_URL=${DEFAULT_INFRA_URL:-http://localhost:8084}
      - TT_INFRA_INTERNAL_URL=${TT_INFRA_INTERNAL_URL:-http://host.docker.internal:8084}
      - SSO_SHARED_SECRET=${SSO_SHARED_SECRET:-tt-sso-dev-secret-change-me}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-tt-internal-dev-secret-change-me}
      - SSO_TOKEN_EXPIRY_SECONDS=${SSO_TOKEN_EXPIRY_SECONDS:-60}
      - RATELIMIT_STORAGE_URI=memory://
    restart: unless-stopped

  tt-postgres-auth:
    image: postgres:16
    container_name: tt-postgres-auth
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tt_auth}
      - POSTGRES_USER=${POSTGRES_USER:-tt_auth}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tt_auth_password}
      - TZ=${TZ:-Europe/Zurich}
    volumes:
      - tt-auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tt_auth} -d ${POSTGRES_DB:-tt_auth}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  tt-auth-data:
  tt-auth-postgres-data:
