services:
  tt-auth:
    build: .
    image: ghcr.io/swisi/tt-auth:latest
    ports:
      - "8086:5000"
    volumes:
      - tt-auth-data:/app/instance
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-8}
      - JWT_COOKIE_DOMAIN=${JWT_COOKIE_DOMAIN:-localhost}
      - JWT_COOKIE_SECURE=${JWT_COOKIE_SECURE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUTO_CREATE_DB=true
      - CREATE_DEFAULT_USERS=${CREATE_DEFAULT_USERS:-true}
      - CREATE_DEFAULT_SERVICES=${CREATE_DEFAULT_SERVICES:-true}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - DEFAULT_AGENDA_URL=${DEFAULT_AGENDA_URL:-http://localhost:8085}
      - SSO_SHARED_SECRET=${SSO_SHARED_SECRET:-tt-sso-dev-secret-change-me}
      - SSO_TOKEN_EXPIRY_SECONDS=${SSO_TOKEN_EXPIRY_SECONDS:-60}
      - RATELIMIT_STORAGE_URI=memory://
    restart: unless-stopped

volumes:
  tt-auth-data:
